<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src http://localhost:3000 ws://localhost:3000;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concordia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════ AUTH SCREEN ═══════════════════════ -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <img class="auth-logo" src="../../branding/Wordmark%20-%20Indigo.svg" alt="Concordia" />
      <p class="tagline">Real-time chat</p>

      <div class="tab-row">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="auth-form">
        <input id="login-username" type="text" placeholder="Username" autocomplete="username" required />
        <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required />
        <button type="submit" class="btn-primary">Sign in</button>
        <p class="error-msg" id="login-error"></p>
      </form>

      <!-- Register form -->
      <form id="register-form" class="auth-form hidden">
        <input id="reg-username" type="text" placeholder="Username" autocomplete="username" required />
        <input id="reg-password" type="password" placeholder="Password" autocomplete="new-password" required />
        <button type="submit" class="btn-primary">Create account</button>
        <p class="error-msg" id="reg-error"></p>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════ CHAT SCREEN ════════════════════════ -->
  <div id="chat-screen" class="screen hidden">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <img class="sidebar-icon" src="../../branding/Icon%20-%20Indigo.png" alt="Concordia" />
        <button id="btn-new-channel" class="icon-btn" title="New channel">+</button>
      </div>

      <ul id="channel-list"></ul>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar" id="current-user-avatar"></div>
          <span id="current-user-label"></span>
        </div>
        <div class="sidebar-footer-actions">
          <button id="btn-settings" class="icon-btn" title="Settings">&#9881;</button>
          <button id="btn-logout" class="icon-btn" title="Log out">&#9211;</button>
        </div>
      </div>
    </aside>

    <!-- Main pane -->
    <main id="chat-pane">
      <!-- Placeholder shown when no channel selected -->
      <div id="no-channel-placeholder">
        <p>Select a channel to start chatting</p>
      </div>

      <!-- Active channel view -->
      <div id="channel-view" class="hidden">
        <header id="channel-header">
          <span id="channel-name-label"></span>
          <button id="btn-delete-channel" class="danger-btn" title="Delete channel">Delete</button>
        </header>

        <div id="message-list">
          <button id="btn-load-more" class="load-more-btn">Load older messages</button>
          <div id="messages-container"></div>
        </div>

        <div id="typing-bar"></div>

        <form id="message-form">
          <input id="message-input" type="text" placeholder="Message…" autocomplete="off" />
          <button type="submit" class="btn-primary send-btn">Send</button>
        </form>
      </div>
    </main>
  </div>

  <!-- New-channel modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>New Channel</h2>
      </div>
      <form id="new-channel-form">
        <input id="new-channel-name" type="text" placeholder="Channel name" required />
        <input id="new-channel-desc" type="text" placeholder="Description (optional)" />
        <div class="modal-actions">
          <button type="button" id="btn-cancel-modal" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
        <p class="error-msg" id="channel-error"></p>
      </form>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal settings-modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="btn-close-settings" class="icon-btn" title="Close">&times;</button>
      </div>
      <div class="settings-section">
        <h3>Appearance</h3>
        <div class="setting-row">
          <div class="setting-label-group">
            <span class="setting-label">Light mode</span>
            <span class="setting-desc">Switch between dark and light theme</span>
          </div>
          <button id="theme-toggle" class="toggle-btn" role="switch" aria-checked="false">
            <span class="toggle-thumb"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
